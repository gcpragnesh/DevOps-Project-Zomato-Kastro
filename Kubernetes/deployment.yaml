apiVersion: apps/v1
kind: Deployment
metadata:
  name: zomato
  labels:
    app: zomato
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zomato
  template:
    metadata:
      labels:
        app: zomato
    spec:
      containers:
      - name: zomato
        image: 755687317354.dkr.ecr.ap-south-1.amazonaws.com/foodappzomato:latest       
        ports:
        - containerPort: 3000
